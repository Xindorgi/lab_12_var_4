name: AI PR Helper (Single Workflow)

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Get Diff
        run: |
          # Явно подтягиваем базовую ветку, чтобы git её видел
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: Cache pip packages
        uses: actions/cache@v4 
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install openai

      - name: Check for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Generate AI Summary
        env:
          LLM7_API_KEY: ${{ secrets.LLM7_API_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
        shell: python
        run: |
          import os
          from openai import OpenAI

          client = OpenAI(
              api_key=os.getenv("LLM7_API_KEY"),
              base_url="https://api.llm7.io/v1"
          )

          if not os.path.exists("diff.txt") or os.path.getsize("diff.txt") == 0:
              summary = "Изменений не обнаружено или diff пуст."
          else:
              with open("diff.txt", "r", encoding="utf-8") as f:
                  diff_content = f.read()
              
              truncated_diff = diff_content[:12000]
              prompt = f"""Ты — профессиональный техлид. Проанализируй изменения в коде (diff) и напиши краткое резюме для Pull Request на русском языке.
              Используй формат:
              - **Что сделано:** (список ключевых изменений)
              - **На что обратить внимание:** (возможные риски или важные правки)

              Вот текст diff:
              {truncated_diff}"""

              try:
                  response = client.chat.completions.create(
                      model="gpt-4o-mini", # Убедись, что этот ID модели поддерживается провайдером
                      messages=[{"role": "user", "content": prompt}],
                      temperature=0.2
                  )
                  summary = response.choices[0].message.content
              except Exception as e:
                  summary = f"⚠️ Ошибка при генерации описания: {str(e)}"

          with open("summary.txt", "w", encoding="utf-8") as f:
              f.write(summary)

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          filePath: summary.txt