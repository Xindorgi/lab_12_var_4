{% extends "base.html" %}
{% block content %}
<h2>Регистрация</h2>
<div class="row">
    <div class="col-md-6">
        <form id="registerForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">Роль</label>
                <select class="form-select" id="role">
                    <option value="candidate">Кандидат</option>
                    <option value="employer">Работодатель</option>
                    <option value="admin">Администратор</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
        <div id="error" class="text-danger mt-2"></div>
        <div id="success" class="text-success mt-2"></div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;

    const resp = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role })
    });
    const data = await resp.json();
    if (resp.ok) {
        document.getElementById('success').textContent = 'Регистрация успешна! Теперь вы можете войти.';
        document.getElementById('error').textContent = '';
        document.getElementById('registerForm').reset();
    } else {
        document.getElementById('error').textContent = data.detail || 'Ошибка регистрации';
        document.getElementById('success').textContent = '';
    }
});
</script>
{% endblock %}
