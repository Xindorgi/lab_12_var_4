{% extends "base.html" %}
{% block content %}
<h2>Доступные вакансии</h2>
<div id="vacanciesList" class="row mt-3"></div>

<script>
(async () => {
    const resp = await apiFetch('/vacancies/?active_only=true');
    if (!resp.ok) {
        document.getElementById('vacanciesList').innerHTML = '<div class="alert alert-danger">Не удалось загрузить вакансии</div>';
        return;
    }
    const vacancies = await resp.json();
    const container = document.getElementById('vacanciesList');
    if (vacancies.length === 0) {
        container.innerHTML = '<p>Нет активных вакансий</p>';
        return;
    }
    container.innerHTML = vacancies.map(v => `
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">${v.title}</h5>
                    <p class="card-text">${v.description || ''}</p>
                    <p><strong>Зарплата:</strong> ${v.salary_min} – ${v.salary_max}</p>
                    ${role === 'candidate' ? `<button class="btn btn-primary" onclick="apply(${v.id})">Откликнуться</button>` : ''}
                </div>
            </div>
        </div>
    `).join('');

    window.apply = async (vacancyId) => {
        const resp = await apiFetch('/applications/', {
            method: 'POST',
            body: JSON.stringify({ vacancy_id: vacancyId })
        });
        if (resp.ok) {
            alert('Отклик отправлен!');
        } else {
            const err = await resp.json();
            alert('Ошибка: ' + (err.detail || 'не удалось откликнуться'));
        }
    };
})();
</script>
{% endblock %}
