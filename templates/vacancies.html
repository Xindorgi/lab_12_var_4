{% extends "base.html" %}
{% block content %}
<h2>Доступные вакансии</h2>
<div id="createVacancyBtn" class="mb-3" style="display:none;">
    <a href="/employer" class="btn btn-success">Создать вакансию</a>
</div>
<div id="vacanciesList" class="row mt-3"></div>

<div class="modal fade" id="applyModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Отклик на вакансию</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="applyVacancyId">
                <div class="mb-3">
                    <label for="coverLetter" class="form-label">Сопроводительное письмо (необязательно)</label>
                    <textarea class="form-control" id="coverLetter" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="submitApply">Отправить отклик</button>
            </div>
        </div>
    </div>
</div>

<script>
console.log('Vacancies page loaded');

let applyModal;
document.addEventListener('DOMContentLoaded', () => {
    applyModal = new bootstrap.Modal(document.getElementById('applyModal'));

    document.getElementById('submitApply').addEventListener('click', async () => {
        const vacancyId = document.getElementById('applyVacancyId').value;
        const coverLetter = document.getElementById('coverLetter').value;
        const resp = await apiFetch('/applications/', {
            method: 'POST',
            body: JSON.stringify({ 
                vacancy_id: parseInt(vacancyId), 
                cover_letter: coverLetter || null 
            })
        });
        if (resp.ok) {
            alert('Отклик отправлен!');
            applyModal.hide();
        } else {
            const err = await resp.json();
            alert('Ошибка: ' + (err.detail || 'не удалось откликнуться'));
        }
    });
});

(async () => {
    if (role === 'employer' || role === 'admin') {
        document.getElementById('createVacancyBtn').style.display = 'block';
    }

    const resp = await apiFetch('/vacancies/?active_only=true');
    if (!resp.ok) {
        document.getElementById('vacanciesList').innerHTML = '<div class="alert alert-danger">Не удалось загрузить вакансии</div>';
        return;
    }
    const vacancies = await resp.json();
    const container = document.getElementById('vacanciesList');
    if (vacancies.length === 0) {
        container.innerHTML = '<p>Нет активных вакансий</p>';
        return;
    }
    container.innerHTML = vacancies.map(v => `
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">${v.title}</h5>
                    <p class="card-text">${v.description || ''}</p>
                    <p><strong>Зарплата:</strong> ${v.salary_min} – ${v.salary_max}</p>
                    ${role === 'candidate' ? `<button class="btn btn-primary" onclick="openApplyModal(${v.id})">Откликнуться</button>` : ''}
                </div>
            </div>
        </div>
    `).join('');
})();

window.openApplyModal = (vacancyId) => {
    document.getElementById('applyVacancyId').value = vacancyId;
    document.getElementById('coverLetter').value = '';
    applyModal.show();
};
</script>
{% endblock %}
