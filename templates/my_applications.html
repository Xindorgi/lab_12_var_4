{% extends "base.html" %}
{% block content %}
<h2>Мои отклики</h2>
<div id="applicationsList" class="mt-3"></div>

<script>
(async () => {
    const resp = await apiFetch('/applications/my');
    if (!resp.ok) {
        document.getElementById('applicationsList').innerHTML = '<div class="alert alert-danger">Не удалось загрузить отклики</div>';
        return;
    }
    const apps = await resp.json();
    const container = document.getElementById('applicationsList');
    if (apps.length === 0) {
        container.innerHTML = '<p>У вас пока нет откликов</p>';
        return;
    }
    container.innerHTML = `
        <table class="table table-striped">
            <thead>
                <tr><th>Вакансия</th><th>Дата отклика</th><th>Статус</th><th>Сопроводительное письмо</th></tr>
            </thead>
            <tbody>
                ${apps.map(a => `
                    <tr>
                        <td>${a.vacancy_id}</td>
                        <td>${new Date(a.created_at).toLocaleDateString()}</td>
                        <td>${a.status}</td>
                        <td>${a.cover_letter || '-'}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
})();
</script>
{% endblock %}
