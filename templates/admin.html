{% extends "base.html" %}
{% block content %}
<h2>Админ-панель</h2>

<ul class="nav nav-tabs mb-3" id="adminTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="stats-tab" data-bs-toggle="tab" data-bs-target="#stats" type="button" role="tab">Статистика</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="vacancies-tab" data-bs-toggle="tab" data-bs-target="#vacancies" type="button" role="tab">Все вакансии</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="applications-tab" data-bs-toggle="tab" data-bs-target="#applications" type="button" role="tab">Все отклики</button>
    </li>
</ul>

<div class="tab-content">
    <div class="tab-pane fade show active" id="stats" role="tabpanel">
        <div class="row mt-3">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Статистика вакансий</div>
                    <div class="card-body" id="statsContent">Загрузка...</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Отклики по вакансиям</div>
                    <div class="card-body" id="appsByVacancy">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-pane fade" id="vacancies" role="tabpanel">
        <button class="btn btn-success mb-3" id="createVacancyBtn">Создать вакансию</button>
        <div id="allVacanciesList"></div>
    </div>

    <div class="tab-pane fade" id="applications" role="tabpanel">
        <div id="allApplicationsList"></div>
    </div>
</div>

<div class="modal fade" id="vacancyModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Вакансия</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="vacancyId">
                <div class="mb-3">
                    <label for="title" class="form-label">Название</label>
                    <input type="text" class="form-control" id="title" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" id="description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label for="requirements" class="form-label">Требования</label>
                    <textarea class="form-control" id="requirements" rows="3"></textarea>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label for="salary_min" class="form-label">Зарплата мин</label>
                        <input type="number" class="form-control" id="salary_min" value="0">
                    </div>
                    <div class="col">
                        <label for="salary_max" class="form-label">Зарплата макс</label>
                        <input type="number" class="form-control" id="salary_max" value="0">
                    </div>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="is_active" checked>
                    <label class="form-check-label" for="is_active">Активна</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="saveVacancyBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script>
let vacancyModal;
document.addEventListener('DOMContentLoaded', () => {
    vacancyModal = new bootstrap.Modal(document.getElementById('vacancyModal'));

    loadStats();

    document.getElementById('vacancies-tab').addEventListener('click', loadAllVacancies);
    document.getElementById('applications-tab').addEventListener('click', loadAllApplications);

    document.getElementById('createVacancyBtn').addEventListener('click', () => {
        document.getElementById('modalTitle').textContent = 'Новая вакансия';
        document.getElementById('vacancyId').value = '';
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('requirements').value = '';
        document.getElementById('salary_min').value = 0;
        document.getElementById('salary_max').value = 0;
        document.getElementById('is_active').checked = true;
        vacancyModal.show();
    });

    document.getElementById('saveVacancyBtn').addEventListener('click', async () => {
        const id = document.getElementById('vacancyId').value;
        const data = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            requirements: document.getElementById('requirements').value,
            salary_min: parseFloat(document.getElementById('salary_min').value) || 0,
            salary_max: parseFloat(document.getElementById('salary_max').value) || 0,
            is_active: document.getElementById('is_active').checked
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? '/vacancies/' + id : '/vacancies/';
        const resp = await apiFetch(url, { method, body: JSON.stringify(data) });
        if (resp.ok) {
            vacancyModal.hide();
            loadAllVacancies();
        } else {
            const err = await resp.json();
            alert('Ошибка: ' + (err.detail || ''));
        }
    });
});

async function loadStats() {
    const statsResp = await apiFetch('/analytics/vacancies-stats');
    if (statsResp.ok) {
        const stats = await statsResp.json();
        document.getElementById('statsContent').innerHTML = `
            <p>Всего вакансий: <strong>${stats.total}</strong></p>
            <p>Активных: <strong>${stats.active}</strong></p>
        `;
    } else {
        document.getElementById('statsContent').innerHTML = '<div class="text-danger">Ошибка</div>';
    }

    const appsResp = await apiFetch('/analytics/applications-by-vacancy');
    if (appsResp.ok) {
        const data = await appsResp.json();
        if (data.length === 0) {
            document.getElementById('appsByVacancy').innerHTML = '<p>Нет данных</p>';
        } else {
            document.getElementById('appsByVacancy').innerHTML = `
                <table class="table table-sm">
                    <thead><tr><th>Вакансия</th><th>Откликов</th></tr></thead>
                    <tbody>
                        ${data.map(d => `<tr><td>${d.vacancy}</td><td>${d.applications}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
        }
    } else {
        document.getElementById('appsByVacancy').innerHTML = '<div class="text-danger">Ошибка</div>';
    }
}

async function loadAllVacancies() {
    const resp = await apiFetch('/vacancies/');
    if (!resp.ok) {
        document.getElementById('allVacanciesList').innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        return;
    }
    const vacancies = await resp.json();
    const container = document.getElementById('allVacanciesList');
    if (vacancies.length === 0) {
        container.innerHTML = '<p>Нет вакансий</p>';
        return;
    }
    container.innerHTML = `
        <table class="table table-striped">
            <thead><tr><th>Название</th><th>Работодатель</th><th>Активна</th><th>Действия</th></tr></thead>
            <tbody>
                ${vacancies.map(v => `
                    <tr>
                        <td>${v.title}</td>
                        <td>#${v.employer_id}</td>
                        <td>${v.is_active ? 'Да' : 'Нет'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="editVacancy(${v.id})">Ред.</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteVacancy(${v.id})">Уд.</button>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

async function loadAllApplications() {
    const resp = await apiFetch('/applications/all');
    if (!resp.ok) {
        document.getElementById('allApplicationsList').innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        return;
    }
    const apps = await resp.json();
    const container = document.getElementById('allApplicationsList');
    if (apps.length === 0) {
        container.innerHTML = '<p>Нет откликов</p>';
        return;
    }
    container.innerHTML = `
        <table class="table table-striped">
            <thead><tr><th>ID</th><th>Кандидат</th><th>Вакансия</th><th>Статус</th></tr></thead>
            <tbody>
                ${apps.map(a => `
                    <tr>
                        <td>${a.id}</td>
                        <td>#${a.candidate_id}</td>
                        <td>#${a.vacancy_id}</td>
                        <td>${a.status}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

window.editVacancy = async (id) => {
    const resp = await apiFetch('/vacancies/' + id);
    if (!resp.ok) return alert('Ошибка');
    const v = await resp.json();
    document.getElementById('modalTitle').textContent = 'Редактирование';
    document.getElementById('vacancyId').value = v.id;
    document.getElementById('title').value = v.title;
    document.getElementById('description').value = v.description || '';
    document.getElementById('requirements').value = v.requirements || '';
    document.getElementById('salary_min').value = v.salary_min;
    document.getElementById('salary_max').value = v.salary_max;
    document.getElementById('is_active').checked = v.is_active;
    vacancyModal.show();
};

window.deleteVacancy = async (id) => {
    if (!confirm('Удалить вакансию?')) return;
    const resp = await apiFetch('/vacancies/' + id, { method: 'DELETE' });
    if (resp.ok) loadAllVacancies();
    else alert('Ошибка удаления');
};
</script>
{% endblock %}
