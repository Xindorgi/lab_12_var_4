{% extends "base.html" %}
{% block content %}
<h2>Мои вакансии</h2>
<button class="btn btn-success mb-3" id="createBtn">Создать вакансию</button>
<div id="vacanciesList"></div>

<!-- Модальное окно создания/редактирования вакансии -->
<div class="modal fade" id="vacancyModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Вакансия</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="vacancyId">
                <div class="mb-3">
                    <label for="title" class="form-label">Название</label>
                    <input type="text" class="form-control" id="title" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" id="description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label for="requirements" class="form-label">Требования</label>
                    <textarea class="form-control" id="requirements" rows="3"></textarea>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label for="salary_min" class="form-label">Зарплата мин</label>
                        <input type="number" class="form-control" id="salary_min" value="0">
                    </div>
                    <div class="col">
                        <label for="salary_max" class="form-label">Зарплата макс</label>
                        <input type="number" class="form-control" id="salary_max" value="0">
                    </div>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="is_active" checked>
                    <label class="form-check-label" for="is_active">Активна</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="saveVacancyBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно назначения собеседования -->
<div class="modal fade" id="interviewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Назначить собеседование</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="interviewApplicationId">
                <div class="mb-3">
                    <label for="interviewTime" class="form-label">Дата и время</label>
                    <input type="datetime-local" class="form-control" id="interviewTime" required>
                </div>
                <div class="mb-3">
                    <label for="interviewLocation" class="form-label">Место / Ссылка</label>
                    <input type="text" class="form-control" id="interviewLocation">
                </div>
                <div class="mb-3">
                    <label for="interviewNotes" class="form-label">Заметки</label>
                    <textarea class="form-control" id="interviewNotes" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="scheduleInterviewBtn">Назначить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно просмотра откликов -->
<div class="modal fade" id="applicationsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Отклики на вакансию</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="applicationsContent">
                Загрузка...
            </div>
        </div>
    </div>
</div>

<script>
let vacancyModal, applicationsModal, interviewModal;

document.addEventListener('DOMContentLoaded', () => {
    vacancyModal = new bootstrap.Modal(document.getElementById('vacancyModal'));
    applicationsModal = new bootstrap.Modal(document.getElementById('applicationsModal'));
    interviewModal = new bootstrap.Modal(document.getElementById('interviewModal'));

    document.getElementById('interviewModal').addEventListener('hidden.bs.modal', () => {
        applicationsModal.show();
    });    

    document.getElementById('createBtn').addEventListener('click', () => {
        document.getElementById('modalTitle').textContent = 'Новая вакансия';
        document.getElementById('vacancyId').value = '';
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('requirements').value = '';
        document.getElementById('salary_min').value = 0;
        document.getElementById('salary_max').value = 0;
        document.getElementById('is_active').checked = true;
        vacancyModal.show();
    });

    document.getElementById('saveVacancyBtn').addEventListener('click', saveVacancy);

    // Обработчик кнопки "Назначить собеседование"
    document.getElementById('scheduleInterviewBtn').addEventListener('click', async () => {
        const appId = document.getElementById('interviewApplicationId').value;
        const scheduled_time = document.getElementById('interviewTime').value;
        const location = document.getElementById('interviewLocation').value;
        const notes = document.getElementById('interviewNotes').value;
        if (!scheduled_time) {
            alert('Выберите дату и время');
            return;
        }
        const resp = await apiFetch('/interviews/', {
            method: 'POST',
            body: JSON.stringify({
                application_id: parseInt(appId),
                scheduled_time: new Date(scheduled_time).toISOString(),
                location: location || null,
                notes: notes || null
            })
        });
        if (resp.ok) {
            alert('Собеседование назначено!');
            interviewModal.hide();
        } else {
            const err = await resp.json();
            alert('Ошибка: ' + (err.detail || ''));
        }
    });

    loadVacancies();
});

async function loadVacancies() {
    const resp = await apiFetch('/vacancies/');
    if (!resp.ok) {
        document.getElementById('vacanciesList').innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        return;
    }
    const vacancies = await resp.json();
    const container = document.getElementById('vacanciesList');
    if (vacancies.length === 0) {
        container.innerHTML = '<p>У вас пока нет вакансий</p>';
        return;
    }
    container.innerHTML = `
        <table class="table table-striped">
            <thead><tr><th>Название</th><th>Активна</th><th>Действия</th></tr></thead>
            <tbody>
                ${vacancies.map(v => `
                    <tr>
                        <td>${v.title}</td>
                        <td>${v.is_active ? 'Да' : 'Нет'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="editVacancy(${v.id})">Ред.</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteVacancy(${v.id})">Уд.</button>
                            <button class="btn btn-sm btn-info" onclick="viewApplications(${v.id})">Отклики</button>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

window.editVacancy = async (id) => {
    const resp = await apiFetch('/vacancies/' + id);
    if (!resp.ok) {
        alert('Не удалось загрузить вакансию');
        return;
    }
    const v = await resp.json();
    document.getElementById('modalTitle').textContent = 'Редактирование';
    document.getElementById('vacancyId').value = v.id;
    document.getElementById('title').value = v.title;
    document.getElementById('description').value = v.description || '';
    document.getElementById('requirements').value = v.requirements || '';
    document.getElementById('salary_min').value = v.salary_min;
    document.getElementById('salary_max').value = v.salary_max;
    document.getElementById('is_active').checked = v.is_active;
    vacancyModal.show();
};

async function saveVacancy() {
    const id = document.getElementById('vacancyId').value;
    const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        requirements: document.getElementById('requirements').value,
        salary_min: parseFloat(document.getElementById('salary_min').value) || 0,
        salary_max: parseFloat(document.getElementById('salary_max').value) || 0,
        is_active: document.getElementById('is_active').checked
    };
    const method = id ? 'PUT' : 'POST';
    const url = id ? '/vacancies/' + id : '/vacancies/';
    const resp = await apiFetch(url, { method, body: JSON.stringify(data) });
    if (resp.ok) {
        vacancyModal.hide();
        loadVacancies();
    } else {
        const err = await resp.json();
        alert('Ошибка: ' + (err.detail || 'не удалось сохранить'));
    }
}

window.deleteVacancy = async (id) => {
    if (!confirm('Удалить вакансию?')) return;
    const resp = await apiFetch('/vacancies/' + id, { method: 'DELETE' });
    if (resp.ok) {
        loadVacancies();
    } else {
        alert('Ошибка удаления');
    }
};

window.viewApplications = async (vacancyId) => {
    const content = document.getElementById('applicationsContent');
    content.innerHTML = 'Загрузка...';
    applicationsModal.show();

    const resp = await apiFetch('/applications/to-me');
    if (!resp.ok) {
        content.innerHTML = '<div class="alert alert-danger">Ошибка загрузки откликов</div>';
        return;
    }
    const allApps = await resp.json();
    const apps = allApps.filter(a => a.vacancy_id === vacancyId);

    if (apps.length === 0) {
        content.innerHTML = '<p>На эту вакансию пока нет откликов</p>';
        return;
    }

    let html = `
        <table class="table table-sm">
            <thead><tr><th>Кандидат</th><th>Дата</th><th>Статус</th><th>Сопроводительное письмо</th><th></th></tr></thead>
            <tbody>
    `;
    apps.forEach(a => {
        html += `
            <tr>
                <td>Кандидат #${a.candidate_id}</td>
                <td>${new Date(a.created_at).toLocaleDateString()}</td>
                <td>${a.status}</td>
                <td>${a.cover_letter || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-success" onclick="openInterviewModal(${a.id})">Назначить собеседование</button>
                </td>
            </tr>
        `;
    });
    html += '</tbody></table>';
    content.innerHTML = html;
};

window.openInterviewModal = (applicationId) => {
    document.getElementById('interviewApplicationId').value = applicationId;
    document.getElementById('interviewTime').value = '';
    document.getElementById('interviewLocation').value = '';
    document.getElementById('interviewNotes').value = '';
    applicationsModal.hide(); 
    interviewModal.show();
};
</script>
{% endblock %}
