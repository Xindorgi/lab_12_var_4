<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    async function apiFetch(url, options = {}) {
        const currentToken = localStorage.getItem('token');
        if (!options.headers) options.headers = {};
        if (currentToken) {
            options.headers['Authorization'] = 'Bearer ' + currentToken;
        }
        options.headers['Content-Type'] = 'application/json';
        return await fetch(url, options);
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('role');
        window.location.href = '/login';
    }

    function updateNav() {
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        document.getElementById('nav-login').style.display = token ? 'none' : 'block';
        document.getElementById('nav-register').style.display = token ? 'none' : 'block';
        document.getElementById('nav-logout').style.display = token ? 'block' : 'none';
        if (role === 'candidate' || role === 'admin') {
            document.getElementById('nav-resume').style.display = 'block';
            document.getElementById('nav-applications').style.display = 'block';
        } else {
            document.getElementById('nav-resume').style.display = 'none';
            document.getElementById('nav-applications').style.display = 'none';
        }
        if (role === 'employer' || role === 'admin') {
            document.getElementById('nav-employer').style.display = 'block';
        } else {
            document.getElementById('nav-employer').style.display = 'none';
        }
        if (role === 'admin') {
            document.getElementById('nav-admin').style.display = 'block';
        } else {
            document.getElementById('nav-admin').style.display = 'none';
        }
    }
</script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">HR Platform</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/vacancies">Вакансии</a></li>
                    <li class="nav-item" id="nav-resume" style="display:none;"><a class="nav-link" href="/resume">Моё резюме</a></li>
                    <li class="nav-item" id="nav-applications" style="display:none;"><a class="nav-link" href="/applications">Мои отклики</a></li>
                    <li class="nav-item" id="nav-employer" style="display:none;"><a class="nav-link" href="/employer">Мои вакансии</a></li>
                    <li class="nav-item" id="nav-admin" style="display:none;"><a class="nav-link" href="/admin">Админ-панель</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" id="nav-login"><a class="nav-link" href="/login">Войти</a></li>
                    <li class="nav-item" id="nav-register"><a class="nav-link" href="/register">Регистрация</a></li>
                    <li class="nav-item" id="nav-logout" style="display:none;">
                        <a class="nav-link" href="#" onclick="logout()">Выйти</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        updateNav();
    </script>
</body>
</html>
